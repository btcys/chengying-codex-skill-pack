interface:
  display_name: "橙影 Codex 企业级工作流"
  short_description: "通过对话把项目想法或已有需求收敛为可开发、可验收的 Codex 工作流"
  default_prompt: "Use $chengying-codex-enterprise-skill to classify whether the user has a rough idea, semi-formed requirements, or complete project materials; choose the right Lean/Standard/Enterprise process mode; reuse existing PRD/design/code context when available; perform PRD-stage competitor, same-product, and open-source research only when needed; produce a complete PRD or lean handoff, Product Design brief, UI/UX design spec, technical spec or ADR when risk requires it, validation strategy with QA matrix, workflow gate checks at key boundaries, phased development plan, controlled execution handoff, automated test/fix loop, independent phase acceptance when required, requirement compliance review, code review, release governance, and feedback-driven document evolution before coding."

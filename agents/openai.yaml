interface:
  display_name: "橙影 Codex 企业级工作流"
  short_description: "通过对话把项目想法或已有需求收敛为可开发、可验收的 Codex 工作流"
  default_prompt: "Use $chengying-codex-enterprise-skill to classify whether the user has a rough idea, semi-formed requirements, or complete project materials; choose the right Lean/Standard/Enterprise process mode; keep the current conversation as PM Thread until execution is explicitly authorized; never let Level 2/Standard or Level 3/Enterprise be developed by the PM Thread; dispatch those projects to an Execution Thread or existing execution thread, or output an Execution Thread task package and stop if thread tools are unavailable; reuse existing PRD/design/code context when available; perform PRD-stage competitor, same-product, and open-source research only when needed; archive user/external reference, modification, target, or acceptance-target screenshots as visual references, and keep Codex-generated before/after or QA screenshots as execution evidence; produce a complete PRD or lean handoff, Product Design brief, UI/UX design spec, technical spec or ADR when risk requires it, validation strategy with QA matrix, workflow gate checks at key boundaries, phased development plan, pre-execution thread plan, pre-development alignment packet / Handoff draft, one-paragraph Goal Prompt for user authorization, automated test/fix loop, independent phase acceptance when required, requirement compliance review, code review, release governance, and feedback-driven document evolution before coding."

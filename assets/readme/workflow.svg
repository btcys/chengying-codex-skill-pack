<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">橙影 Codex 工作流主链路</title>
  <desc id="desc">PM alignment, goal authorization, execution, phase acceptance, requirement compliance, code review, and release.</desc>
  <rect width="1280" height="360" rx="28" fill="#F8FAFC"/>
  <rect x="1" y="1" width="1278" height="358" rx="27" stroke="#DDE7EF" stroke-width="2"/>
  <text x="64" y="68" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="800">从想法到可验收交付</text>
  <text x="64" y="101" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="17">先形成短任务卡；能开发就连续开发、测试、修复，风险出现再补文档和审查。</text>

  <g transform="translate(64 150)">
    <g>
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#ECFDF5" stroke="#99F6E4"/>

      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">现状 / 风险</text>
    </g>
    <path d="M150 46H194" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M185 36L197 46L185 56" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(206 0)">
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
      <text x="22" y="38" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="800">任务卡</text>
      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">范围 / 验收</text>
    </g>
    <path d="M356 46H400" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M391 36L403 46L391 56" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(412 0)">
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
      <text x="22" y="38" fill="#6D28D9" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="800">Execution</text>
      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">开发 / 测试</text>
    </g>
    <path d="M562 46H606" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M597 36L609 46L597 56" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(618 0)">
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
      <text x="22" y="38" fill="#C2410C" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="800">验证</text>
      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">测试 / 截图</text>
    </g>
    <path d="M768 46H812" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M803 36L815 46L803 56" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(824 0)">
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#FDF2F8" stroke="#FBCFE8"/>
      <text x="22" y="38" fill="#BE185D" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="800">沉淀</text>
      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">状态 / 决策</text>
    </g>
    <path d="M974 46H1018" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M1009 36L1021 46L1009 56" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(1030 0)">
      <rect x="0" y="0" width="138" height="92" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
      <text x="22" y="38" fill="#4338CA" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="800">交付</text>
      <text x="22" y="64" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">结果 / 风险</text>
    </g>
  </g>

  <g transform="translate(64 288)">
    <rect x="0" y="0" width="358" height="34" rx="17" fill="#E0F2FE"/>
    <text x="18" y="23" fill="#075985" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">任务卡：目标、范围、验收、风险</text>
    <rect x="376" y="0" width="382" height="34" rx="17" fill="#DCFCE7"/>
    <text x="394" y="23" fill="#166534" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">自动推进：开发、测试、修复连续完成</text>
    <rect x="776" y="0" width="350" height="34" rx="17" fill="#FAE8FF"/>
    <text x="794" y="23" fill="#86198F" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">风险触发：技术方案、审查、Handoff</text>
  </g>

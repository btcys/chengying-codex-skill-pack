<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">橙影 Codex 企业级工作流 Skill Pack</title>
  <desc id="desc">A visual overview of PM alignment, handoff, execution, validation, code review, and release governance for Codex software projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07231F"/>
      <stop offset="0.48" stop-color="#0F3F3B"/>
      <stop offset="1" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="100" y1="72" x2="1160" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="32" fill="url(#bg)"/>
  <path d="M113 97C226 43 370 38 500 86C624 132 735 158 873 113C989 75 1087 93 1171 151" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M92 420C213 365 342 355 487 396C621 434 746 453 884 400C1008 352 1101 374 1192 432" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="64" width="1140" height="392" rx="28" fill="#F8FAFC" fill-opacity="0.96"/>
    <rect x="70" y="64" width="1140" height="392" rx="28" stroke="#DDE7EF"/>
  </g>

  <g transform="translate(112 107)">
    <rect x="0" y="0" width="126" height="34" rx="17" fill="#D9F3EF"/>
    <text x="18" y="23" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Codex Skill</text>

    <text x="0" y="98" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="0">橙影 Codex 企业级工作流</text>
    <text x="0" y="147" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">把软件想法收敛成可开发、可验收、可交接的 Codex 工作单</text>
    <text x="0" y="187" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">短任务卡 · 连续开发测试修复 · 必要时沉淀文档</text>
  </g>

  <g transform="translate(112 332)">
    <rect x="0" y="0" width="175" height="68" rx="16" fill="#ECFDF5" stroke="#99F6E4"/>
    <text x="20" y="29" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">PM Thread</text>
    <text x="20" y="51" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">需求 / 范围 / 风险</text>

    <rect x="197" y="0" width="175" height="68" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="217" y="29" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">Handoff</text>
    <text x="217" y="51" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Work ID / 边界 / 验收</text>

    <rect x="394" y="0" width="175" height="68" rx="16" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="414" y="29" fill="#6D28D9" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">Execution</text>
    <text x="414" y="51" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">开发 / 测试 / 修复</text>

    <rect x="591" y="0" width="175" height="68" rx="16" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="611" y="29" fill="#C2410C" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">Acceptance</text>
    <text x="611" y="51" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">阶段验收 / 打回</text>

    <rect x="788" y="0" width="175" height="68" rx="16" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="808" y="29" fill="#BE185D" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">Review</text>
    <text x="808" y="51" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">一致性 / Code Review</text>
  </g>

  <g transform="translate(912 118)">
    <rect x="0" y="0" width="226" height="154" rx="22" fill="#0F766E"/>
    <text x="26" y="43" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Execution Gate</text>
    <text x="26" y="82" fill="white" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800">先对齐</text>
    <text x="26" y="119" fill="white" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800">再写代码</text>
  </g>
</svg>
